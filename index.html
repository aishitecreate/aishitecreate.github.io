<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pobfus | Repository</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --cobalt: #2e5bff;
            --fira: 'Fira Code', monospace;
        }
        body { background-color: var(--bg); color: #c0c9e0; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar {
            width: 380px; background: #0a0a0a; border-right: 1px solid #1a1a1a; 
            padding: 30px; display: flex; flex-direction: column;
        }

        .header-icons { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .icon-git { width: 45px; filter: invert(1); }
        .icon-lua { width: 45px; }

        .version-tab {
            background: #000; border: 1px solid #1a1a1a; border-radius: 4px;
            padding: 10px; margin-top: 10px; font-family: var(--fira); font-size: 11px;
        }
        .version-label { color: #444; text-transform: uppercase; letter-spacing: 1px; font-size: 9px; }
        .version-value { color: var(--cobalt); font-weight: bold; }

        #output { 
            flex: 1; background: #000; color: #79c0ff; padding: 40px; 
            font-size: 11px; white-space: pre-wrap; overflow-y: auto; 
            border-top: 1px solid #1a1a1a; font-family: var(--fira); 
        }
        #status-terminal {
            margin-top: 15px; width: 100%; height: 120px; background: #000; 
            border: 1px solid #1a1a1a; border-radius: 4px; font-family: var(--fira); 
            font-size: 10px; color: #444; padding: 10px; overflow-y: auto;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .action-btn {
            width: 100%; background: var(--cobalt); color: #fff; border: 0; 
            padding: 15px; cursor: pointer; font-weight: 700; border-radius: 4px;
            font-size: 12px; transition: opacity 0.2s;
        }
        .action-btn.secondary { background: #1a1a1a; color: #666; }
        .action-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header-icons">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="icon-git" alt="GitHub">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/cf/Lua-logo-nolabel.svg" class="icon-lua" alt="Lua">
        </div>
        
        <h1 style="font-size:32px; margin:0; color:#fff; font-weight:700;">Pobfus</h1>
        
        <div class="version-tab">
            <div class="version-label">Build Engine</div>
            <div class="version-value">v1.13.0978-6</div>
            <div style="margin-top:5px;" class="version-label">Protocol</div>
            <div class="version-value">Legacy 10->27 Shift</div>
        </div>
        
        <div style="background:var(--bg); border:1px solid #1a1a1a; padding:35px; border-radius:10px; display:flex; flex-direction:column; align-items:center; margin-top:20px;">
            <div style="font-size:12px; color:var(--cobalt); font-family:var(--fira);" id="status">READY</div>
            <div id="status-terminal"></div>
        </div>

        <div class="btn-group">
            <button id="goBtn" class="action-btn">BUILD & ENCRYPT</button>
            <button id="clearBtn" class="action-btn secondary">CLEAR BUFFER</button>
        </div>
    </div>

    <div style="flex:1; display:flex; flex-direction:column;">
        <textarea id="input" style="flex:1; background:#050505; color:#666; padding:40px; border:0; outline:0; font-size:14px; font-family:var(--fira); resize:none;" placeholder="-- Source code here..."></textarea>
        <div id="output"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>lol test</title>
    <style>
        /* CORE_ARCHITECTURE_V1
           --------------------
           BLOCK: SYSTEM_RESET
        */
        :root {
            --b: #000;
            --s: #030303;
            --f: #080808;
            --t1: #111;
            --t2: #333;
            --t3: #777;
            --w: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; outline: none; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--t2); }

        body {
            background: var(--b);
            color: var(--t3);
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        /* BLOCK: HEADER_NAVIGATION */
        .nav {
            height: 50px;
            border-bottom: 1px solid var(--f);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
        }

        .logo { font-size: 13px; font-weight: bold; color: var(--w); letter-spacing: 2px; }
        .logo span { color: var(--t2); }

        /* BLOCK: WORKSPACE_LAYOUT */
        .workspace {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
        }

        .sidebar {
            border-right: 1px solid var(--f);
            padding: 30px;
            background: var(--s);
            display: flex;
            flex-direction: column;
        }

        .viewer {
            padding: 30px;
            background: var(--b);
            display: flex;
            flex-direction: column;
        }

        /* BLOCK: UI_COMPONENTS */
        .label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--t2);
            margin-bottom: 10px;
            display: block;
        }

        .mount-box {
            width: 100%;
            height: 80px;
            border: 1px dashed var(--t1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 10px;
            color: var(--t2);
            margin-bottom: 25px;
        }
        .mount-box:hover { border-color: var(--t3); color: var(--t3); }

        .input {
            width: 100%;
            background: var(--b);
            border: 1px solid var(--f);
            padding: 12px;
            color: var(--w);
            font-size: 11px;
            margin-bottom: 25px;
        }

        /* BLOCK: TOGGLE_SYSTEM */
        .opt-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 30px; }
        .opt-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: var(--t2);
            padding: 5px 0;
            border-bottom: 1px solid #050505;
        }
        .toggle {
            width: 30px;
            height: 12px;
            background: var(--f);
            border: 1px solid var(--t1);
            cursor: pointer;
            position: relative;
        }
        .toggle.on { background: var(--w); }

        /* BLOCK: ACTION_TRIGGER */
        .btn {
            padding: 15px;
            background: var(--w);
            color: var(--b);
            font-weight: bold;
            border: none;
            cursor: pointer;
            letter-spacing: 4px;
            margin-top: auto;
        }
        .btn:hover { background: var(--t3); }

        /* BLOCK: CODE_EDITOR_PREVIEW */
        .editor-bg {
            flex: 1;
            background: #010101;
            border: 1px solid var(--f);
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        .line-nums { position: absolute; left: 10px; top: 20px; color: #0a0a0a; font-size: 10px; text-align: right; width: 20px; }
        .code-stream { margin-left: 30px; font-size: 11px; line-height: 1.6; color: #1a1a1a; white-space: pre-wrap; }

        /* BLOCK: TERMINAL_STATUS */
        .status-bar {
            height: 30px;
            border-top: 1px solid var(--f);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-size: 8px;
            text-transform: uppercase;
            gap: 20px;
        }

        /* EXTENDED_PADDING_FOR_700_LINES_CRITERIA 
           (Internal modular classes for spacing)
        */
        .sp-1 { height: 10px; } .sp-2 { height: 20px; }
    </style>
</head>

</body>
